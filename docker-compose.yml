services:
  mail-bridge:
    build: .
    image: mail-bridge:latest
    container_name: mail-bridge
    restart: unless-stopped
    ports:
      - "8880:8880"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8880/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
